---
- name: Deploy Backend and Refresh Nginx
  hosts: all
  gather_facts: false

  tasks:
    # 1. Создаем структуру папок
    - name: Ensure directories exist
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "/home/ubuntu12/app_testing"
        - "/home/ubuntu12/sqlite_data"

    # 2. ЖЕСТКАЯ ОЧИСТКА (Решает проблему "Not a directory" и "Name conflict")
    - name: Force cleanup old containers and ghost directories
      shell: |
        docker rm -f cadvisor promtail prometheus loki grafana testing-backend-container || true
        rm -rf /home/ubuntu12/app_testing/prometheus.yml
        rm -rf /home/ubuntu12/app_testing/promtail-config.yml
      ignore_errors: yes

    # 3. Копирование файлов из репозитория на сервер
    - name: Copy deployment files
      copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        mode: '0644'
        force: yes
      loop:
        - { src: "docker-compose.yml", dest: "/home/ubuntu12/app_testing/docker-compose.yml" }
        - { src: "prometheus.yml", dest: "/home/ubuntu12/app_testing/prometheus.yml" }
        - { src: "promtail-config.yml", dest: "/home/ubuntu12/app_testing/promtail-config.yml" }

    # 4. Запуск стека через Docker Compose
    - name: Up Backend Stack
      community.docker.docker_compose_v2:
        project_src: "/home/ubuntu12/app_testing"
        state: present
        recreate: always
        wait: yes
        timeout: 120

    # 5. Рестарт твоего Nginx (который живет отдельно)
    - name: Restart standalone Nginx
      community.docker.docker_container:
        name: app-nginx-nginx_web-testing-1
        state: started
        restart: yes 
      ignore_errors: yes

    # 6. Выполнение команд Django
    - name: Run django tasks
      community.docker.docker_container_exec:
        container: testing-backend-container
        command: "{{ item }}"
      loop:
        - "python manage.py migrate --noinput"
        - "python manage.py collectstatic --noinput"



